# vibecheck — AI slop detection for PRs
# Add this file to .github/workflows/ in your repo.
# Docs: https://github.com/qinnovates/vibecheck-slop-stopper

name: vibecheck

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  vibecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: qinnovates/vibecheck-slop-stopper@main
        # with:
        #   severity: medium      # low | medium | high | critical
        #   category: ""          # ai-slop,pseudocode,security (comma-separated)
        #   fail-on: high         # high | critical | any | none
        #   comment: "true"       # post findings as PR comment
