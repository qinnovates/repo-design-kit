<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <radialGradient id="t" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00ffe5" stop-opacity="0.9"/>
      <stop offset="10%" stop-color="#00c4b8" stop-opacity="0.9"/>
      <stop offset="22%" stop-color="#0088a3" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#004d6d" stop-opacity="0.9"/>
      <stop offset="62%" stop-color="#001a2e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="c" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgb(0,255,229)" stop-opacity="0.14"/>
      <stop offset="40%" stop-color="rgb(0,180,200)" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="rgb(0,180,200)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#00ffe5"/>
      <stop offset="25%" stop-color="#00c8c0"/>
      <stop offset="50%" stop-color="#0098a8"/>
      <stop offset="75%" stop-color="#006888"/>
      <stop offset="100%" stop-color="#003850"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.50"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.02"/>
