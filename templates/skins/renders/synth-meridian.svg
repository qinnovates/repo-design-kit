  <circle cx="170.0" cy="2.6666666666666665" r="60.0" fill="rgba(0,255,229,0.3)" filter="url(#blobBlur)"/>
  <circle cx="560.0" cy="4.333333333333333" r="53.333333333333336" fill="rgba(0,160,200,0.24)" filter="url(#blobBlur)"/>
  <circle cx="385.0" cy="6.833333333333333" r="43.333333333333336" fill="rgba(0,60,110,0.2)" filter="url(#blobBlur)"/>
    <rect width="900" height="12" fill="url(#t)"/>
