<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <linearGradient id="bar" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#ff00c8"/>
      <stop offset="20%" stop-color="#660044"/>
      <stop offset="40%" stop-color="#220022"/>
      <stop offset="50%" stop-color="#000000"/>
      <stop offset="60%" stop-color="#002222"/>
      <stop offset="80%" stop-color="#004466"/>
      <stop offset="100%" stop-color="#00c8ff"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="pill"><rect width="900" height="12" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#pill)">
    <rect width="900" height="12" fill="#000"/>
    <rect width="900" height="12" fill="url(#spec)"/>
    <rect x="6" y="4" width="888" height="4" rx="2" fill="url(#bar)" opacity="0.45" filter="url(#glow)"/>
    <rect x="6" y="5" width="888" height="2" rx="1" fill="url(#bar)" opacity="0.85"/>
  </g>
  <rect width="900" height="12" rx="6" fill="none" stroke="url(#rim)" stroke-width="1"/>
</svg>
