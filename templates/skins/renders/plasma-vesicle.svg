  <circle cx="150.0" cy="2.6666666666666665" r="60.0" fill="rgba(139,92,246,0.42)" filter="url(#blobBlur)"/>
  <circle cx="580.0" cy="4.333333333333333" r="53.333333333333336" fill="rgba(6,182,212,0.3)" filter="url(#blobBlur)"/>
  <circle cx="365.0" cy="7.666666666666667" r="43.333333333333336" fill="rgba(217,70,239,0.24)" filter="url(#blobBlur)"/>
    <rect width="900" height="12" fill="url(#t)"/>
    <rect width="900" height="12" fill="url(#c)"/>
    <rect width="900" height="12" fill="url(#spec)"/>
    <rect x="8" y="5" width="884" height="3" rx="1.5" fill="url(#bar)" opacity="0.55" filter="url(#barGlow)"/>
    <rect x="8" y="6" width="884" height="1.5" rx="0.75" fill="url(#bar)" opacity="0.85"/>
