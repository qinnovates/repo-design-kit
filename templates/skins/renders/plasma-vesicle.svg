<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <radialGradient id="t" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#ff2df0" stop-opacity="0.9"/>
      <stop offset="12%" stop-color="#c400e8" stop-opacity="0.9"/>
      <stop offset="28%" stop-color="#7a00cc" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#3d0066" stop-opacity="0.9"/>
      <stop offset="72%" stop-color="#0a0014" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="c" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="rgb(255,45,240)" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="rgb(160,0,255)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="rgb(160,0,255)" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#ff2df0"/>
      <stop offset="25%" stop-color="#d000e0"/>
      <stop offset="50%" stop-color="#9b00d4"/>
      <stop offset="75%" stop-color="#6d00c4"/>
      <stop offset="100%" stop-color="#3d0066"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.50"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.02"/>
