<svg xmlns="http://www.w3.org/2000/svg" width="900" height="12" viewBox="0 0 900 12">
  <defs>
    <linearGradient id="bar" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#c88840"/>
      <stop offset="25%" stop-color="#9a6428"/>
      <stop offset="50%" stop-color="#7a4060"/>
      <stop offset="75%" stop-color="#5a2864"/>
      <stop offset="100%" stop-color="#3a5020"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.50"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="barGlow"><feGaussianBlur stdDeviation="3" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="pill"><rect x="0" y="0" width="900" height="12" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#pill)">
    <rect width="900" height="12" fill="#000"/>
    <rect width="900" height="12" fill="url(#spec)"/>
    <rect x="8" y="5" width="884" height="3" rx="1.5" fill="url(#bar)" opacity="0.55" filter="url(#barGlow)"/>
    <rect x="8" y="6" width="884" height="1.5" rx="0.75" fill="url(#bar)" opacity="0.85"/>
  </g>
  <rect width="900" height="12" rx="6" fill="none" stroke="url(#rim)" stroke-width="1.5"/>
</svg>