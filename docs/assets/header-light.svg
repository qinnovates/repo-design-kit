<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <!-- Turrell aperture — soft 2-color, muted warm into cool -->
    <radialGradient id="turrell" cx="50%" cy="50%" r="60%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#d4a878" stop-opacity="0.10"/>
      <stop offset="35%" stop-color="#b08868" stop-opacity="0.06"/>
      <stop offset="65%" stop-color="#685088" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#403060" stop-opacity="0.02"/>
    </radialGradient>

    <!-- Chrome rim — darker for light mode -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="black" stop-opacity="0.12"/>
      <stop offset="15%" stop-color="black" stop-opacity="0.05"/>
      <stop offset="35%" stop-color="black" stop-opacity="0.02"/>
      <stop offset="50%" stop-color="black" stop-opacity="0.01"/>
      <stop offset="65%" stop-color="black" stop-opacity="0.02"/>
      <stop offset="85%" stop-color="black" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.10"/>
    </linearGradient>

    <!-- Specular -->
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.70"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Title gradient — warm to cool, deeper for light bg -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a07848"/>
      <stop offset="30%" stop-color="#906840"/>
      <stop offset="50%" stop-color="#705878"/>
      <stop offset="70%" stop-color="#584880"/>
      <stop offset="100%" stop-color="#483878"/>
    </linearGradient>

    <!-- Bar gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c08860"/>
      <stop offset="50%" stop-color="#907088"/>
      <stop offset="100%" stop-color="#504078"/>
    </linearGradient>

    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="1.5" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pill background — white glass -->
  <rect x="10" y="8" width="680" height="104" rx="52" ry="52" fill="#f8f6f4"/>

  <!-- Turrell glow -->
  <rect x="10" y="8" width="680" height="104" rx="52" ry="52" fill="url(#turrell)"/>

  <!-- Chrome rim -->
  <rect x="10" y="8" width="680" height="104" rx="52" ry="52"
        fill="none" stroke="url(#rim)" stroke-width="1.5"/>

  <!-- Specular -->
  <rect x="40" y="8" width="620" height="52" rx="26" ry="26" fill="url(#spec)"/>

  <!-- Center bar — base -->
  <rect x="30" y="55" width="640" height="2" rx="1" ry="1"
        fill="url(#barGrad)" opacity="0.25"/>

  <!-- Center bar — sharp -->
  <rect x="30" y="55.5" width="640" height="1" rx="0.5" ry="0.5"
        fill="url(#barGrad)" opacity="0.40"/>

  <!-- Title -->
  <text x="350" y="56"
        font-family="'SF Pro Display','Inter','Helvetica Neue',sans-serif"
        font-size="30" font-weight="800" letter-spacing="6"
        fill="url(#titleGrad)" text-anchor="middle"
        filter="url(#titleGlow)">REPO DESIGN KIT</text>

  <!-- Tagline -->
  <text x="350" y="78"
        font-family="'SF Pro Text','Inter','Helvetica Neue',sans-serif"
        font-size="9" font-weight="300" letter-spacing="2"
        fill="#806888" fill-opacity="0.5" text-anchor="middle">25 skins. Liquid glass. One command.</text>

  <!-- Watermark -->
  <text x="678" y="104" font-family="monospace" font-size="3"
        fill="black" opacity="0.04" text-anchor="end">KevQ</text>
</svg>
