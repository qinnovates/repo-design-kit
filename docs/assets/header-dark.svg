<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <clipPath id="pill">
      <rect width="700" height="120" rx="60"/>
    </clipPath>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.50"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#e8e8f0" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky photo clipped to pill -->
  <g clip-path="url(#pill)">
    <image href="sky.png" x="0" y="0" width="700" height="120" preserveAspectRatio="xMidYMid slice"/>
  </g>

  <!-- Specular top arc -->
  <rect width="700" height="60" rx="30" fill="url(#spec)" clip-path="url(#pill)"/>

  <!-- Chrome rim -->
  <rect width="700" height="120" rx="60" fill="none" stroke="url(#rim)" stroke-width="1.5"/>

  <!-- Title -->
  <text x="350" y="66"
        font-family="'SF Pro Display','Inter','Helvetica Neue',sans-serif"
        font-size="32" font-weight="800" letter-spacing="8"
        fill="url(#titleGrad)" text-anchor="middle"
        filter="url(#titleGlow)">REPO DESIGN KIT</text>

  <!-- Tagline -->
  <text x="350" y="86"
        font-family="'SF Pro Text','Inter','Helvetica Neue',sans-serif"
        font-size="9" font-weight="300" letter-spacing="2"
        fill="white" fill-opacity="0.50" text-anchor="middle">25 skins. Liquid glass. One command.</text>

  <!-- KevQ watermark — barely visible -->
  <text x="672" y="110"
        font-family="monospace" font-size="4"
        fill="white" opacity="0.03"
        text-anchor="end">KevQ</text>
</svg>
