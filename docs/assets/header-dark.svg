<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="sky" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#8fa4c4"/>
      <stop offset="25%" stop-color="#7b94b8"/>
      <stop offset="50%" stop-color="#6880a8"/>
      <stop offset="75%" stop-color="#4e6a96"/>
      <stop offset="100%" stop-color="#3a5688"/>
    </radialGradient>
    <radialGradient id="c1" cx="70%" cy="25%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c2" cx="25%" cy="65%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c3" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky fill -->
  <rect width="400" height="400" fill="url(#sky)"/>

  <!-- Cloud wisps -->
  <rect width="400" height="400" fill="url(#c1)"/>
  <rect width="400" height="400" fill="url(#c2)"/>
  <rect width="400" height="400" fill="url(#c3)"/>

  <!-- Title: bottom-right, small, stacked vertically, right-aligned -->
  <text x="384" y="326"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11" font-weight="300" letter-spacing="2"
        fill="white" fill-opacity="0.55" text-anchor="end">REPO</text>
  <text x="384" y="344"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11" font-weight="800" letter-spacing="2"
        fill="white" fill-opacity="0.55" text-anchor="end">DESIGN</text>
  <text x="384" y="362"
        font-family="Arial,Helvetica,sans-serif"
        font-size="11" font-weight="800" letter-spacing="2"
        fill="white" fill-opacity="0.55" text-anchor="end">KIT</text>

  <!-- KevQ -->
  <text x="384" y="388"
        font-family="monospace" font-size="4"
        fill="white" opacity="0.03" text-anchor="end">KevQ</text>
</svg>
