<svg xmlns="http://www.w3.org/2000/svg" width="700" height="120" viewBox="0 0 700 120">
  <defs>
    <clipPath id="pill">
      <rect width="700" height="120" rx="60"/>
    </clipPath>
    <radialGradient id="sky" cx="55%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#8fa4c4"/>
      <stop offset="30%" stop-color="#7b94b8"/>
      <stop offset="55%" stop-color="#6880a8"/>
      <stop offset="80%" stop-color="#4e6a96"/>
      <stop offset="100%" stop-color="#3a5688"/>
    </radialGradient>
    <radialGradient id="c1" cx="75%" cy="30%" r="30%">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c2" cx="20%" cy="60%" r="25%">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c3" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.03"/>
      <stop offset="85%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="spec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.16"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#e8eaf0" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <g clip-path="url(#pill)">
    <rect width="700" height="120" fill="url(#sky)"/>
    <rect width="700" height="120" fill="url(#c1)"/>
    <rect width="700" height="120" fill="url(#c2)"/>
    <rect width="700" height="120" fill="url(#c3)"/>
    <rect width="700" height="60" fill="url(#spec)"/>
  </g>
  <rect width="700" height="120" rx="60" fill="none" stroke="url(#rim)" stroke-width="1.5"/>
  <text x="350" y="66" font-family="'SF Pro Display','Inter','Helvetica Neue',sans-serif" font-size="32" font-weight="800" letter-spacing="8" fill="url(#tg)" text-anchor="middle" filter="url(#glow)">REPO DESIGN KIT</text>
  <text x="350" y="86" font-family="'SF Pro Text','Inter','Helvetica Neue',sans-serif" font-size="9" font-weight="300" letter-spacing="2" fill="white" fill-opacity="0.45" text-anchor="middle">25 skins. Liquid glass. One command.</text>
  <text x="672" y="108" font-family="monospace" font-size="4" fill="white" opacity="0.03" text-anchor="end">KevQ</text>
</svg>
